services:
  - type: web
    name: crm-backend
    env: rust
    rootDir: backend
    buildCommand: cargo build --release
    startCommand: ./target/release/crm_backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: static_site
    name: crm-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
